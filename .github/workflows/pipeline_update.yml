# This workflow validates, deploys, and runs the specified bundle
# within a pre-production target named "dev".
name: 'Dev-CI Deployment & Run'

# Only one instance of this workflow runs at a time
concurrency:
  group: dev-deployment
  cancel-in-progress: false   # or true if you want to cancel old runs

# Trigger this workflow whenever a pull request is opened against the repo's
# main branch or an existing pull request's head branch is updated.
on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

jobs:
  # Used by the "pipeline_update" job to deploy the bundle.
  # Bundle validation is automatically performed as part of this deployment.
  # If validation fails, this workflow fails.
  deploy:
    name: 'Deploy bundle'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Get the code
      - name: Checkout repository
        uses: actions/checkout@v4   # updated to latest stable version

      # 2. Install Databricks CLI
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # 3. Validate bundle configuration first (fails fast if invalid)
      - name: Validate Databricks Bundle
        run: |
          echo "Validating bundle for target: dev-ci"
          databricks bundle validate --target dev-ci
        env:
          DATABRICKS_TOKEN: ${{ secrets.SP_TOKEN }}

      # 4. Deploy only if validation passed
      - name: Deploy Databricks Bundle
        run: |
          echo "Deploying bundle to target: dev-ci"
          databricks bundle deploy --target dev-ci --auto-approve
          echo "Deployment completed successfully"
        env:
          DATABRICKS_TOKEN: ${{ secrets.SP_TOKEN }}

  # Validate, deploy, and then run the bundle.
  pipeline_update:
    name: 'Run pipeline update'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy]   # only runs if deploy job succeeds
    
    steps:
      # 1. Get the code again (fresh checkout)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Databricks CLI again (safe & explicit)
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # 3. Trigger the job/pipeline defined in the bundle
      - name: Run lseg_job
        run: |
          echo "Triggering lseg_job in dev-ci environment..."
          databricks bundle run lseg_job --target dev-ci --refresh-all
          echo "Job trigger completed"
        env:
          DATABRICKS_TOKEN: ${{ secrets.SP_TOKEN }}